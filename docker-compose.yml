#
# Immich — self-hosted photo/video backup for the family.
# Official docs: https://docs.immich.app/install/docker-compose
#
# Usage:
#   docker compose up -d
#
# To override settings without editing this file, create docker-compose.override.yml
# and run:  docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#

name: immich

services:
  wait-for-data-mount:
    image: alpine:3
    entrypoint: ["sh", "-c", "sleep infinity"]
    volumes:
      - ${DATA_MOUNT_CHECK_PATH:-.}:/mnt:ro
    healthcheck:
      test: test -f /mnt/.mountcheck
      interval: 10s
      timeout: 5s
      start_period: 600s
    restart: always

  wait-for-backup-mount:
    image: alpine:3
    entrypoint: ["sh", "-c", "sleep infinity"]
    volumes:
      - ${BACKUP_MOUNT_CHECK_PATH:-.}:/mnt:ro
    healthcheck:
      test: test -f /mnt/.mountcheck
      interval: 10s
      timeout: 5s
      start_period: 600s
    restart: always

  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION:-./library}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      wait-for-data-mount:
        condition: service_healthy
      redis:
        condition: service_started
      database:
        condition: service_started
    restart: always

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: always

  redis:
    image: docker.io/valkey/valkey:8
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION:-./postgres}:/var/lib/postgresql/data
    shm_size: 128mb
    depends_on:
      wait-for-data-mount:
        condition: service_healthy
    restart: always
    healthcheck:
      test: pg_isready --dbname='${DB_DATABASE_NAME}' --username='${DB_USERNAME}' || exit 1
      interval: 30s
      timeout: 5s
      retries: 5

  backup-db:
    image: prodrigestivill/postgres-backup-local
    environment:
      POSTGRES_HOST: database
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: ${BACKUP_DB_SCHEDULE:-0 2 * * *}
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ${BACKUP_DB_LOCATION:-./backups/db}:/backups
    depends_on:
      wait-for-backup-mount:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: always

  backup-library:
    build: ./backup-library
    environment:
      BACKUP_SCHEDULE: ${BACKUP_LIBRARY_SCHEDULE:-0 3 * * *}
    volumes:
      - ${UPLOAD_LOCATION:-./library}:/source:ro
      - ${BACKUP_LIBRARY_LOCATION:-./backups/library}:/destination
    depends_on:
      wait-for-data-mount:
        condition: service_healthy
      wait-for-backup-mount:
        condition: service_healthy
    restart: always

volumes:
  model-cache:
